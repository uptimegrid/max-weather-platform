apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-api
  namespace: max-weather
spec:
  ingressClassName: nginx
  rules:
    # No host match (catch-all): API Gateway is the single public entry point and
    # forwards requests to the internal NLB with the execute-api Host header, so a
    # hard-coded host would not match. Routing is by path only at the ingress.
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weather-api
                port:
                  number: 80
