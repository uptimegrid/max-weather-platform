apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
  namespace: max-weather
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-api
  template:
    metadata:
      labels:
        app: weather-api
    spec:
      containers:
        - name: weather-api
          # Image name/tag are set per environment by the kustomize overlays
          # and by the Jenkins deploy pipeline (kustomize edit set image).
          image: max-weather-app:latest
          env:
            # VPC egress is IPv4-only (NAT gateway, no egress-only IGW) and the
            # upstreams (open-meteo) are dual-stack: prefer IPv4 for outbound DNS.
            - name: NODE_OPTIONS
              value: "--dns-result-order=ipv4first"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
